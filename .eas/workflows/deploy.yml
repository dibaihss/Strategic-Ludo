# .eas/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: ['main', 'release/*']
    tags: ['v*.*.*']
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    type: deploy
    name: Deploy
    environment: production
    params:
      prod: true