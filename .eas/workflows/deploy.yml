# https://docs.expo.dev/eas/hosting/workflows/
name: Deploy

on:
  push:
    branches: ['main', 'release/*']
    tags: ['v*.*.*']
  workflow_dispatch: {}

concurrency:
  group: ${{ workflow.filename }}-${{ github.ref }}
  cancel_in_progress: true

jobs:
  deploy:
    type: deploy
    name: Deploy
    environment: production
    params:
      prod: true
