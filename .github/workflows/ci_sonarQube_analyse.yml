name: Test + E2E + Sonar

on:
  push:
  pull_request:
    branches:
      - main
  workflow_call:  # 👈 allows release.yml to call it directly
     

jobs:
  test-e2e-sonar:
    name: Test + E2E + Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Run unit tests (if configured)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test -- --watch=false --coverage
          else
            echo "No test script found in package.json; creating empty coverage/lcov.info"
            mkdir -p coverage
            printf "TN:\\n" > coverage/lcov.info
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run web E2E tests
        run: npm run e2e:web -- --workers=1

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: SonarQube Cloud analysis (CI feedback gate)
        # Runs only after tests/E2E pass to provide PR/push feedback signal in one place.
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
          SONAR_PROJECT_KEY: ${{ secrets.PROJECT_KEY }}
          SONAR_ORG_KEY: ${{ secrets.ORGANIZATION_KEY }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_BASE_REF: ${{ github.base_ref }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          SONAR_OPTS="
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.organization=${SONAR_ORG_KEY} \
            -Dsonar.sources=. \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.scm.provider=git
          "

          if [ "$GH_EVENT_NAME" = "pull_request" ]; then
            SONAR_OPTS="$SONAR_OPTS \
              -Dsonar.pullrequest.key=${GH_PR_NUMBER} \
              -Dsonar.pullrequest.branch=${GH_HEAD_REF} \
              -Dsonar.pullrequest.base=${GH_BASE_REF}"
          else
            SONAR_OPTS="$SONAR_OPTS \
              -Dsonar.branch.name=${GH_REF_NAME}"
          fi

          npx sonar-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            $SONAR_OPTS
