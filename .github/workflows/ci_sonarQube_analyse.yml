name: CI

on:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Cloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
          SONAR_PROJECT_KEY: ${{ secrets.PROJECT_KEY }}
          SONAR_ORG_KEY: ${{ secrets.ORGANIZATION_KEY }}
          # User-controlled values isolated as env vars — never inlined into run
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_BASE_REF: ${{ github.base_ref }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          SONAR_OPTS="
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.organization=${SONAR_ORG_KEY} \
            -Dsonar.sources=. \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.scm.provider=git
          "

          if [ "$GH_EVENT_NAME" = "pull_request" ]; then
            SONAR_OPTS="$SONAR_OPTS \
              -Dsonar.pullrequest.key=${GH_PR_NUMBER} \
              -Dsonar.pullrequest.branch=${GH_HEAD_REF} \
              -Dsonar.pullrequest.base=${GH_BASE_REF}"
          else
            SONAR_OPTS="$SONAR_OPTS \
              -Dsonar.branch.name=${GH_REF_NAME}"
          fi

          npx sonar-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            $SONAR_OPTS