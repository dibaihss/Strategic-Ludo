# release.yml
name: Deploy after CI

on:
  push:
    branches:
      - main  # 👈 only deploy on main pushes

jobs:
  ci:
    uses: ./.github/workflows/ci_sonarQube_analyse.yml  # run CI first
    secrets: inherit

  deploy:
    needs: ci  # 👈 only runs if CI job succeeds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Trigger Expo deploy workflow
        run: eas workflow:run .eas/workflows/deploy.yml --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}