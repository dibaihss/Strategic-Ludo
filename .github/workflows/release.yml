# .github/workflows/deploy-after-ci.yml
name: Deploy after CI

on:
  workflow_run:
    workflows: ["Test + E2E + Sonar"]
    types: [completed]
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EAS auth
        run: eas account:view --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Expo deploy workflow
        run: eas workflow:run .eas/workflows/deploy.yml --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
